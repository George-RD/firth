# PRD obligations matrix for the Firth autonomous loop.
# Each [obligation.<id>] row maps one PRD section-4 scope bullet, requirement
# (R1-R17), or success criterion (S1-S7) to the blueprint node responsible for
# it and the todo slugs that discharge it. satisfied_by = [] means the
# obligation is ungenerated: no todo exists yet. Enabling research or design
# work is intentionally not sufficient for a product obligation.

