name = "firth"
version = "0.1.0"
defaultTargets = ["firthTest", "firthParserTest", "firthErasureTest", "firthStackEffectTest", "firthAgentDiagnosticTest", "firthAllTest"]
testDriver = "firthAllTest"

[[lean_lib]]
name = "Firth"
srcDir = "src/interpreter"

[[lean_lib]]
name = "FirthElaborator"
srcDir = "src"
roots = ["elaborator.Firth.Parser", "elaborator.Firth.Erasure", "elaborator.Firth.StackEffect", "elaborator.FirthElaborator"]

[[lean_lib]]
name = "FirthAgent"
srcDir = "src"
roots = ["agent.Firth.Agent.DiagnosticEnvelope", "agent.Firth.Agent.JsonMembers", "agent.Firth.Agent.Validation", "agent.Firth.Agent.ElaboratorDiagnostics"]

[[lean_lib]]
name = "FirthAgentTests"
srcDir = "src"
roots = ["agent.Firth.Agent.DiagnosticEnvelopeTest", "agent.Firth.Agent.ValidationTest", "agent.Firth.Agent.ElaboratorDiagnosticsTest"]

[[lean_exe]]
name = "firthTest"
root = "FirthTest"
srcDir = "src/interpreter"

[[lean_exe]]
name = "firthParserTest"
root = "elaborator.FirthParserTest"
srcDir = "src"

[[lean_exe]]
name = "firthVmFixtures"
root = "FirthVmFixtures"
srcDir = "src/interpreter"

[[lean_exe]]
name = "firthErasureTest"
root = "elaborator.FirthErasureTest"
srcDir = "src"

[[lean_exe]]
name = "firthStackEffectTest"
root = "elaborator.FirthStackEffectTest"
srcDir = "src"

[[lean_exe]]
name = "firthAgentDiagnosticTest"
root = "agent.FirthDiagnosticEnvelopeTest"
srcDir = "src"

[[lean_exe]]
name = "firthAllTest"
root = "agent.FirthAllTest"
srcDir = "src"
